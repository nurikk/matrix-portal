[platformio]
default_envs = matrixportal_s3

[env:matrixportal_s3]
platform = espressif32
board = adafruit_matrixportal_esp32s3
framework = arduino
monitor_speed = 115200
build_unflags = -Os
build_flags =
  -O3
  -D CONFIG_ASYNC_TCP_RUNNING_CORE=0
  -D CONFIG_ASYNC_TCP_QUEUE_SIZE=64
  -D CONFIG_ASYNC_TCP_PRIORITY=10
board_build.partitions = huge_app.csv
extra_scripts = pre:scripts/embed_web_ui.py
lib_deps =
  https://github.com/adafruit/Adafruit_Protomatter.git
  adafruit/Adafruit LIS3DH
  adafruit/Adafruit Unified Sensor
  adafruit/Adafruit GFX Library
  adafruit/Adafruit BusIO
  esp32async/AsyncTCP @ ^3.4.0
  esp32async/ESPAsyncWebServer @ ^3.8.0
  bblanchon/ArduinoJson @ ^7.2.0

[env:matrixportal_s3_4x64_bench_5bit]
extends = env:matrixportal_s3
build_flags =
  ${env:matrixportal_s3.build_flags}
  -DMATRIX_BENCHMARK=1
  -DMATRIX_WIDTH=128
  -DMATRIX_TILE=2
  -DMATRIX_BIT_DEPTH=5

[env:matrixportal_s3_4x64_bench_4bit]
extends = env:matrixportal_s3
build_flags =
  ${env:matrixportal_s3.build_flags}
  -DMATRIX_BENCHMARK=1
  -DMATRIX_WIDTH=128
  -DMATRIX_TILE=2
  -DMATRIX_BIT_DEPTH=4

[env:matrixportal_s3_4x64_bench_3bit]
extends = env:matrixportal_s3
build_flags =
  ${env:matrixportal_s3.build_flags}
  -DMATRIX_BENCHMARK=1
  -DMATRIX_WIDTH=128
  -DMATRIX_TILE=2
  -DMATRIX_BIT_DEPTH=3

[env:matrixportal_s3_4x64_life_4bit_fast]
extends = env:matrixportal_s3
extra_scripts =
  pre:scripts/embed_web_ui.py
  pre:scripts/patch_protomatter_s3_clock.py
custom_protomatter_s3_lcd_clk_prescale = 8
build_flags =
  ${env:matrixportal_s3.build_flags}
  -DMATRIX_WIDTH=128
  -DMATRIX_TILE=2
  -DMATRIX_BIT_DEPTH=4

[env:matrixportal_m4]
platform = atmelsam
board = adafruit_matrix_portal_m4
framework = arduino
monitor_speed = 115200
build_unflags = -Os
build_flags = -O3
lib_deps =
  https://github.com/adafruit/Adafruit_Protomatter.git
  adafruit/Adafruit LIS3DH
  adafruit/Adafruit Unified Sensor
  adafruit/Adafruit GFX Library
  adafruit/Adafruit BusIO
  adafruit/Adafruit Zero DMA Library
lib_ignore =
  Adafruit TinyUSB Library

[env:matrixportal_m4_bootloader]
extends = env:matrixportal_m4
board_upload.use_1200bps_touch = false
board_upload.wait_for_upload_port = false

[env:matrixportal_m4_128_bench_4bit]
extends = env:matrixportal_m4
build_flags =
  ${env:matrixportal_m4.build_flags}
  -DMATRIX_BENCHMARK=1
  -DMATRIX_WIDTH=128
  -DMATRIX_TILE=2
  -DMATRIX_BIT_DEPTH=4

[env:matrixportal_m4_128_bench_3bit]
extends = env:matrixportal_m4
build_flags =
  ${env:matrixportal_m4.build_flags}
  -DMATRIX_BENCHMARK=1
  -DMATRIX_WIDTH=128
  -DMATRIX_TILE=2
  -DMATRIX_BIT_DEPTH=3
